name: CI — Wasp build check

# Catches what shipped silently before: broken imports (e.g. the '../' path bug)
# and type errors. A red build here blocks the merge instead of reaching prod.

on:
  push:
    branches: [main]
    paths: ['compass/app/**', 'compass/mcp/**', 'dfva/**', 'reports/**', 'scripts/**']
  pull_request:
    paths: ['compass/app/**', 'compass/mcp/**', 'dfva/**', 'reports/**', 'scripts/**']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compass/app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'

      - name: Install Wasp 0.24.0
        run: npm install -g @wasp.sh/wasp-cli@0.24.0 @wasp.sh/wasp-cli-linux-x64-glibc@0.24.0

      # Since 0.24, `wasp build` no longer installs dependencies itself and the
      # generated file:.wasp/spec package must exist first.
      - name: Install dependencies (via wasp)
        run: wasp install

      # main.wasp.ts keeps `provider: "Dummy"` for local dev, which Wasp rejects
      # in a production build. Flip to SMTP just for the CI compile (no secrets
      # needed to *build*), matching what deploy-server.sh does at deploy time.
      - name: Allow production build (emailSender Dummy → SMTP)
        run: |
          sed -i 's/provider: "Dummy",/provider: "SMTP",/' main.wasp.ts

      - name: Wasp build (compile + type-check)
        run: wasp build

  unit-tests:
    # The vitest suite includes the auth/ownership regression guards
    # (authorizationGuards.test.ts) — a red suite here blocks the merge.
    # Runs plain vitest with vitest.ci.config.mts (wasp/server aliased to a
    # shim): the Wasp toolchain's own test runner resolves its generated SDK
    # in a platform-dependent way and breaks on Linux runners. Locally, use
    # `wasp test client run` as usual.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compass/app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
      - name: Install Wasp 0.24.0
        run: npm install -g @wasp.sh/wasp-cli@0.24.0 @wasp.sh/wasp-cli-linux-x64-glibc@0.24.0
      - name: Install dependencies (via wasp)
        # `wasp install`, not npm: since 0.24, package.json depends on the
        # generated file:.wasp/spec package (Wasp Spec API), which doesn't
        # exist on a fresh checkout until wasp generates it.
        run: wasp install
      - name: Run unit tests
        run: npx vitest run --config vitest.ci.config.mts
      - name: Prettier check
        run: npx prettier --check src/

  mcp:
    # Type-check + unit tests for the dfva MCP server (previously never in CI —
    # not even its tsc build ran anywhere).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compass/mcp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build (type-check)
        run: npm run build
      - name: Test
        run: npm test

  completeness:
    # Blocks a new course from shipping partial (missing redesign plan, dangling
    # Redesign Plan link, incomplete or source-less dimension evidence).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '24'
      - name: Install script deps
        run: npm ci --prefix scripts || npm install --prefix scripts
      - name: Course completeness check
        run: npm --prefix scripts run dfva:completeness
      - name: Report format lint
        run: npm --prefix scripts run dfva:report-lint
      - name: Report content drift
        run: npm --prefix scripts run dfva:content-check
