name: DFVA drift check

on:
  pull_request:
    paths:
      - 'dfva/source/**'
      - 'scripts/dfva-*.ts'
      - '.github/copilot-instructions.md'
      - '.continue/prompts/dfva.md'
      - 'compass/app/src/compass/sharedProgramData.ts'
      - 'compass/app/src/compass/reportContent*.ts'
      - 'compass/app/src/compass/ReportDetailPage.tsx'
      - 'reports/**'
  push:
    paths:
      - 'dfva/source/**'
      - 'scripts/dfva-*.ts'
      - '.github/copilot-instructions.md'
      - '.continue/prompts/dfva.md'
      - 'compass/app/src/compass/sharedProgramData.ts'
      - 'compass/app/src/compass/reportContent*.ts'
      - 'compass/app/src/compass/ReportDetailPage.tsx'
      - 'reports/**'

permissions:
  contents: read

jobs:
  dfva-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm --prefix scripts install
      - run: npm --prefix scripts run dfva:check
