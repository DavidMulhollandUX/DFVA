name: DFVA drift check

on:
  pull_request:
    paths:
      - 'dfva/source/**'
      - 'scripts/dfva-*.ts'
      - '.github/copilot-instructions.md'
      - '.continue/prompts/dfva.md'
      - 'compass/app/src/compass/sharedProgramData.ts'
      - 'compass/app/src/compass/reportContent*.ts'
      - 'compass/app/src/compass/ReportDetailPage.tsx'
      - 'reports/**'
  push:
    paths:
      - 'dfva/source/**'
      - 'scripts/dfva-*.ts'
      - '.github/copilot-instructions.md'
      - '.continue/prompts/dfva.md'
      - 'compass/app/src/compass/sharedProgramData.ts'
      - 'compass/app/src/compass/reportContent*.ts'
      - 'compass/app/src/compass/ReportDetailPage.tsx'
      - 'reports/**'

jobs:
  dfva-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix scripts install
      - run: npm --prefix scripts run dfva:check
