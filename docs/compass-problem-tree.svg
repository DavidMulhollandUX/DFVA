<svg width="1500" height="970" viewBox="0 0 1500 970" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1500" height="970" fill="#F5F4EF"/>

  <!-- Zone tints -->
  <rect x="0" y="0" width="1500" height="455" fill="#F0FDF4" opacity="0.55"/>
  <rect x="0" y="545" width="1500" height="425" fill="#FFFBEB" opacity="0.55"/>

  <!-- Zone dividers -->
  <line x1="0" y1="455" x2="1500" y2="455" stroke="#BBF7D0" stroke-width="1" stroke-dasharray="5 8"/>
  <line x1="0" y1="545" x2="1500" y2="545" stroke="#FDE68A" stroke-width="1" stroke-dasharray="5 8"/>

  <!-- Title -->
  <text x="750" y="26" font-size="15" font-weight="700" fill="#374151" text-anchor="middle" letter-spacing="0.3">Problem Tree — AI Disruption of the University Sector</text>

  <!-- Zone labels -->
  <text x="32" y="52" font-size="10.5" font-weight="700" fill="#047857" letter-spacing="1.5">EFFECTS / CONSEQUENCES  ↑</text>
  <text x="32" y="924" font-size="10.5" font-weight="700" fill="#92400E" letter-spacing="1.5">ROOT CAUSES  ↓</text>

  <!-- ═══════════════════════════════ -->
  <!-- EFFECT CONNECTING LINES (green) -->
  <!-- from core box top (750, 455)    -->
  <!-- ═══════════════════════════════ -->

  <!-- → E1 bottom-centre (130, 248) -->
  <path d="M 750 455 C 750 375 130 375 130 248" stroke="#059669" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- → E2 bottom-centre (440, 188) -->
  <path d="M 750 455 C 750 355 440 310 440 188" stroke="#059669" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- → E3 bottom-centre (750, 138) -->
  <path d="M 750 455 C 750 320 750 215 750 138" stroke="#059669" stroke-width="3" fill="none" opacity="0.55"/>

  <!-- → E4 bottom-centre (1060, 188) -->
  <path d="M 750 455 C 750 355 1060 310 1060 188" stroke="#059669" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- → E5 bottom-centre (1370, 248) -->
  <path d="M 750 455 C 750 375 1370 375 1370 248" stroke="#059669" stroke-width="2.5" fill="none" opacity="0.45"/>

