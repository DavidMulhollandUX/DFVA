  <!-- ROOT CONNECTING LINES (amber)   -->
  <!-- from core box bottom (750, 545) -->
  <!-- ════════════════════════════════ -->

  <!-- → R1 top-centre (120, 675) -->
  <path d="M 750 545 C 750 625 120 620 120 675" stroke="#D97706" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- → R2 top-centre (380, 755) -->
  <path d="M 750 545 C 750 625 380 700 380 755" stroke="#D97706" stroke-width="2.5" fill="none" opacity="0.45"/>

  <!-- → R3 top-centre (610, 815) -->
